{% extends 'base.html' %}
{% block title %}New Production Batch{% endblock %}
{% block content %}
<h1 class="mb-4">New Production Batch</h1>
<div class="card" style="max-width:600px">
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Product</label>
        <select name="product" class="form-select" required>
          <option value="">-- Select product --</option>
          {% for p in products %}<option value="{{ p.pk }}">{{ p.name }}</option>{% endfor %}
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">Quantity Planned</label>
        <input type="number" name="quantity_planned" class="form-control" required min="1">
      </div>
      <div class="mb-3">
        <label class="form-label">Production Date</label>
        <input type="date" name="production_date" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Notes</label>
        <textarea name="notes" class="form-control" rows="3"></textarea>
      </div>
      <button type="submit" class="btn btn-primary">Create Batch</button>
      <a href="{% url 'production:batch_list' %}" class="btn btn-outline-secondary ms-2">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
