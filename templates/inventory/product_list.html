{% extends 'base.html' %}
{% block title %}Products{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h1>Products</h1>
  <a href="{% url 'inventory:product_create' %}" class="btn btn-primary"><i class="bi bi-plus-lg"></i> Add Product</a>
</div>
<div class="row g-3">
  {% for p in products %}
  <div class="col-sm-6 col-md-4">
    <div class="card h-100">
      <div class="card-body">
        <span class="badge bg-light text-dark mb-2">{{ p.get_category_display }}</span>
        <h5 class="card-title">{{ p.name }}</h5>
        <p class="card-text text-muted">{{ p.description|truncatewords:15 }}</p>
        <p class="fw-bold text-success">${{ p.price }}</p>
      </div>
    </div>
  </div>
  {% empty %}
  <p class="text-muted">No products yet. <a href="{% url 'inventory:product_create' %}">Add one.</a></p>
  {% endfor %}
</div>
{% endblock %}
