{% extends 'base.html' %}
{% block title %}Add Product{% endblock %}
{% block content %}

<a href="{% url 'inventory:product_list' %}" class="back-link">← Products</a>
<div class="page-title" style="margin-bottom:24px">Add Product</div>

<div class="form-card">
  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label class="form-label">Product Name</label>
      <input type="text" name="name" class="form-control" required placeholder="e.g. Sourdough Loaf">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Category</label>
        <select name="category" class="form-control">
          {% for val, label in categories %}<option value="{{ val }}">{{ label }}</option>{% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Price</label>
        <input type="number" name="price" class="form-control" step="0.01" required placeholder="0.00">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea name="description" class="form-control" placeholder="Optional description..."></textarea>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Save Product</button>
      <a href="{% url 'inventory:product_list' %}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>

{% endblock %}
