{% extends 'base.html' %}
{% block title %}New Product{% endblock %}
{% block content %}
<h1 class="mb-4">New Product</h1>
<div class="card" style="max-width:600px">
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="mb-3"><label class="form-label">Name</label><input type="text" name="name" class="form-control" required></div>
      <div class="mb-3">
        <label class="form-label">Category</label>
        <select name="category" class="form-select">
          {% for val, label in categories %}<option value="{{ val }}">{{ label }}</option>{% endfor %}
        </select>
      </div>
      <div class="mb-3"><label class="form-label">Description</label><textarea name="description" class="form-control" rows="3"></textarea></div>
      <div class="mb-3"><label class="form-label">Price</label><input type="number" name="price" class="form-control" step="0.01" required></div>
      <button type="submit" class="btn btn-primary">Save Product</button>
      <a href="{% url 'inventory:product_list' %}" class="btn btn-outline-secondary ms-2">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
